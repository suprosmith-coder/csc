<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cyanet — Create. Collaborate. Launch. The social platform built for developers.">
  <meta name="theme-color" content="#050508">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Cyanet — Create. Collaborate. Launch.">
  <meta property="og:description" content="The social platform built by developers, for developers.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cyanet.dev">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Cyanet — Create. Collaborate. Launch.">
  <meta name="twitter:description" content="The social platform built by developers, for developers.">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <title>Cyanet — Create. Collaborate. Launch.</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2363d9ff'/><text y='24' x='4' font-size='22' font-family='system-ui' font-weight='900'>C</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;text-align:center;padding:20px">
      <div>
        <h2 style="margin-bottom:8px">JavaScript required</h2>
        <p style="color:#888">Cyanet requires JavaScript to run. Please enable it in your browser settings.</p>
      </div>
    </div>
  </noscript>

  <div class="presence-bar" id="presence-bar"></div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-bg">
      <div class="auth-bg-grid"></div>
      <div class="auth-bg-orb orb-1"></div>
      <div class="auth-bg-orb orb-2"></div>
      <div class="auth-bg-orb orb-3"></div>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-mark">C</div>
        <span class="auth-logo-name">Cyanet</span>
      </div>
      <div class="auth-tagline">Create · Collaborate · Launch</div>
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">The social platform built by developers, for developers.</p>

      <button class="auth-btn-github" id="github-login-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        Continue with GitHub
      </button>

      <div class="auth-divider">or sign in with email</div>

      <div class="auth-input-group">
        <label for="auth-email">Email address</label>
        <input type="email" id="auth-email" class="auth-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="auth-input-group">
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" class="auth-input" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="auth-btn-primary" id="login-btn" style="flex:1">Sign In</button>
        <button class="auth-btn-primary" id="signup-btn" style="flex:1;background:transparent;border:1px solid var(--border);color:var(--text-primary)">Sign Up</button>
      </div>
      <button class="auth-btn-primary" id="magic-link-btn" style="background:var(--violet-dim);color:var(--violet);border:1px solid rgba(167,139,250,0.3);width:100%;font-size:13px">
        Send Magic Link instead
      </button>

      <div id="auth-status" style="display:none;margin-top:12px;padding:10px 12px;border-radius:8px;background:var(--bg-elevated);font-size:13px;color:var(--text-secondary);text-align:center"></div>

      <div class="auth-footer" style="margin-top:16px">
        By continuing you agree to Cyanet's <a href="#" rel="noopener">Terms</a> and <a href="#" rel="noopener">Privacy Policy</a>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app">
    <div id="topbar"></div>
    <div class="app-body">
      <aside id="sidebar"></aside>
      <main id="main"></main>
      <aside id="rightbar"></aside>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title-text">New Post</span>
        <button class="modal-close" id="modal-close-btn">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    // NOTE: The Supabase anon key is intentionally public — it is safe to expose in client-side
    // code. Security is enforced via Row Level Security (RLS) policies in the Supabase dashboard.
    // Do NOT expose service_role keys here.
    window.CYANET_CONFIG = {
      SUPABASE_URL: 'https://nynrocdgmowjgslgfdmc.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55bnJvY2RnbW93amdzbGdmZG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTUxNTQsImV4cCI6MjA5MzIzMTE1NH0.280rrXAe92hxylzia2hl3ygRrG0LraDzBCGwQUeXu5U',
      SITE_URL: window.location.origin,
    };
  </script>

  <script src="app.js"></script>
  <script>
    document.getElementById('modal-close-btn').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('open');
    });
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
      }
    });
  </script>

</body>
</html>
