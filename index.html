<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="auth-box">
      <div class="logo">Devit</div>
      <p class="tagline">Where developers connect.</p>

      <div id="auth-tabs" class="tabs">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab" data-tab="register">Sign Up</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit" class="btn-primary">Sign In</button>
        <p id="login-error" class="form-error"></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input type="text" id="reg-username" placeholder="Username" required />
        <input type="email" id="reg-email" placeholder="Email" required />
        <input type="password" id="reg-password" placeholder="Password (min 6 chars)" required />
        <button type="submit" class="btn-primary">Create Account</button>
        <p id="reg-error" class="form-error"></p>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="screen hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">Devit</div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="feed">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </button>
        <button class="nav-btn" data-view="explore">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Explore
        </button>
        <button class="nav-btn" data-view="notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          Notifications
          <span id="notif-badge" class="badge hidden">0</span>
        </button>
        <button class="nav-btn" data-view="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </button>
      </nav>
      <button id="logout-btn" class="logout-btn">Sign Out</button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- FEED VIEW -->
      <div id="view-feed" class="view">
        <div class="view-header">
          <h2>Home</h2>
        </div>
        <div class="compose-box">
          <textarea id="post-content" placeholder="What's on your mind, dev?" maxlength="500"></textarea>
          <div class="compose-footer">
            <span id="char-count" class="char-count">500</span>
            <button id="post-btn" class="btn-primary">Post</button>
          </div>
        </div>
        <div id="feed-list" class="post-list">
          <div class="loading">Loading posts...</div>
        </div>
      </div>

      <!-- EXPLORE VIEW -->
      <div id="view-explore" class="view hidden">
        <div class="view-header">
          <h2>Explore</h2>
        </div>
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search posts or #tags..." />
          <button id="search-btn" class="btn-primary">Search</button>
        </div>
        <div id="trending-tags" class="trending-section">
          <h3>Trending Tags</h3>
          <div id="tag-list" class="tag-list"></div>
        </div>
        <div id="search-results" class="post-list"></div>
      </div>

      <!-- NOTIFICATIONS VIEW -->
      <div id="view-notifications" class="view hidden">
        <div class="view-header">
          <h2>Notifications</h2>
        </div>
        <div id="notif-list" class="notif-list">
          <div class="loading">Loading notifications...</div>
        </div>
      </div>

      <!-- PROFILE VIEW -->
      <div id="view-profile" class="view hidden">
        <div id="profile-header" class="profile-header"></div>
        <div id="profile-tabs" class="tabs" style="margin: 0 0 0; border-bottom: 1px solid var(--border); border-radius:0; padding: 4px 16px;">
          <button class="tab active" data-ptab="posts">Posts</button>
          <button class="tab" data-ptab="likes">Likes</button>
        </div>
        <div id="profile-posts" class="post-list"></div>
      </div>

    </main>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">
      <div class="who-to-follow">
        <h3>Who to Follow</h3>
        <div id="suggestions-list"></div>
      </div>
    </aside>

  </div>

  <!-- POST DETAIL MODAL -->
  <div id="post-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-box">
      <button class="modal-close">&times;</button>
      <div id="modal-post"></div>
      <div class="reply-compose">
        <textarea id="reply-content" placeholder="Post your reply..." maxlength="500"></textarea>
        <button id="reply-btn" class="btn-primary">Reply</button>
      </div>
      <div id="modal-replies" class="post-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
